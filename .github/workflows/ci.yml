name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev,aws,gcp,ai]"
      - run: pytest

  debian-package:
    runs-on: ubuntu-latest
    container: debian:testing-slim
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y build-essential debhelper dh-python pybuild-plugin-pyproject python3-all python3-click python3-requests python3-setuptools lintian
      - run: dpkg-buildpackage -us -uc -b
      - run: lintian ../stratus-ai_*_all.deb
